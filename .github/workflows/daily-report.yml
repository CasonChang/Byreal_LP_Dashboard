name: 每日收益報告（備援・手動觸發）

# 每日報告已改由 Zeabur 常駐 daemon 負責（每天 00:00 UTC = 台北 08:00）。
# 這裡只保留手動觸發當備援。自動排程已停用，避免與 Zeabur 重複發報告。
on:
  workflow_dispatch:

concurrency:
  group: byreal-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 產生並推播每日報告
        env:
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RANGE_WARN_PCT: ${{ vars.RANGE_WARN_PCT || '8' }}
          TZ: Asia/Taipei
        run: npm run daily-report
        # 資料直接寫進 Supabase（dashboard_state），不再 commit JSON 進 git。
