name: 每日收益報告

on:
  schedule:
    - cron: '0 0 * * *' # 每天 00:00 UTC = 台北 08:00
  workflow_dispatch:

concurrency:
  group: byreal-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: 產生並推播每日報告
        env:
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RANGE_WARN_PCT: ${{ vars.RANGE_WARN_PCT || '8' }}
          TZ: Asia/Taipei
        run: npm run daily-report

      - name: 提交更新後的 JSON 快照
        run: |
          git config user.name "byreal-bot"
          git config user.email "actions@github.com"
          git add docs/data/*.json
          if git diff --staged --quiet; then
            echo "沒有變更"
            exit 0
          fi
          git commit -m "chore: 每日報告快照 [skip ci]"
          for i in 1 2 3 4; do
            git pull --rebase origin ${{ github.ref_name }} && git push && break
            echo "push 失敗，重試 $i"; sleep $((2**i))
          done
