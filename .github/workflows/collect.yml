name: 收集 LP 資料（備援・手動觸發）

# 收集已改由 Zeabur 常駐 daemon 負責（每 10 分鐘）。
# 這裡只保留手動觸發當備援：Zeabur 萬一掛了，可到 Actions 頁手動按一下補跑。
# 自動排程已停用（GitHub cron 不可靠，且會與 Zeabur 重複寫入/重複推播）。
on:
  workflow_dispatch: # 僅手動觸發

concurrency:
  group: byreal-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 收集快照 + 偵測事件 + 推播
        env:
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RANGE_WARN_PCT: ${{ vars.RANGE_WARN_PCT || '8' }}
          TZ: Asia/Taipei
        run: npm run collect
        # 資料直接寫進 Supabase（dashboard_state），不再 commit JSON 進 git。
