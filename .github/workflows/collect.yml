name: 收集 LP 資料（每小時）

on:
  schedule:
    - cron: '0 * * * *' # 每小時整點 (UTC)
  workflow_dispatch: # 可手動觸發
  push: # 程式碼變更時重新收集一次（不含資料快照本身，避免迴圈）
    branches:
      - main
      - claude/sharp-hopper-75u1v0
    paths:
      - 'src/**'
      - '.github/workflows/collect.yml'

concurrency:
  group: byreal-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 收集快照 + 偵測事件 + 推播
        env:
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RANGE_WARN_PCT: ${{ vars.RANGE_WARN_PCT || '8' }}
          TZ: Asia/Taipei
        run: npm run collect

      - name: 提交更新後的 JSON 快照
        run: |
          git config user.name "byreal-bot"
          git config user.email "actions@github.com"
          git add docs/data/*.json
          if git diff --staged --quiet; then
            echo "沒有變更"
            exit 0
          fi
          git commit -m "chore: 更新 LP 快照 [skip ci]"
          for i in 1 2 3 4; do
            git pull --rebase origin ${{ github.ref_name }} && git push && break
            echo "push 失敗，重試 $i"; sleep $((2**i))
          done
