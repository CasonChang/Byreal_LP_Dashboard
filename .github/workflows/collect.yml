name: 收集 LP 資料（每 15 分鐘）

on:
  schedule:
    - cron: '*/15 * * * *' # 每 15 分鐘 (UTC，GitHub cron 為盡力而為、可能略延遲)
  workflow_dispatch: # 可手動觸發
  push: # 程式碼變更時重新收集一次（不含資料快照本身，避免迴圈）
    branches:
      - main
      - claude/sharp-hopper-75u1v0
    paths:
      - 'src/**'
      - '.github/workflows/collect.yml'

concurrency:
  group: byreal-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 收集快照 + 偵測事件 + 推播
        env:
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RANGE_WARN_PCT: ${{ vars.RANGE_WARN_PCT || '8' }}
          TZ: Asia/Taipei
        run: npm run collect
        # 資料直接寫進 Supabase（dashboard_state），不再 commit JSON 進 git。
