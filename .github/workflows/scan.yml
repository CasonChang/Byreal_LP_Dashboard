name: 熱門池掃描（備援・手動觸發）

# 熱門池掃描已改由 Zeabur 常駐 daemon 負責（每 12 小時，寫進 Supabase）。
# 這裡只保留手動觸發當備援。自動排程已停用，且不再 commit scan.json（改寫 Supabase）。
on:
  workflow_dispatch:

concurrency:
  group: byreal-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: 跑掃描（寫進 Supabase dashboard_state['scan']）
        env:
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx src/scan.ts
